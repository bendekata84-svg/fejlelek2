);border-top:1px solid var(--line);padding:10px 12px calc(10px + env(safe-area-inset-bottom));z-index:10}.footerbar .wrap{display:flex;gap:10px}.footerbar .btn{flex:1}.hide{display:none!important}@media (min-width:720px){.pairrow{grid-template-columns:1fr 1.2fr;align-items:center}.tfgrid{grid-template-columns:1fr 1fr}.stem{font-size:21px}}

<script id="data" type="application/json">[{"id": 1, "type": "pair", "stem": "Válaszd ki az összetartozó párokat!", "pairs": [["Kardinalitás", "számolási elv"], ["Siegler", "információfeldolgozás"], ["Dekódolás", "6-7 éves"], ["Visszautasított agresszív gyerek", "externalizáció"], ["Reaktív kövérség", "pszichoanalitikus irányzat"]], "explanation": "A kardinalitás a számlálási elvekhez tartozik: számoláskor az utoljára kimondott szám jelöli a halmaz elemszámát.\nSiegler az információfeldolgozási megközelítéshez kapcsolódik: a fejlődést a stratégiák, figyelmi-emlékezeti folyamatok és problémamegoldás változásával magyarázza.\nA dekódolás az olvasástanulás korai szakasza, kb. 6-7 éves korban: betűk, hangok, szavak megfejtése.\nA visszautasított agresszív gyereknél a probléma kifelé jelenik meg: agresszió, ellenséges értelmezés, externalizáció.\nA reaktív kövérség érzelmi stresszhez, feszültséglevezetéshez kapcsolódik, ezért illik a pszichoanalitikus értelmezéshez."}, {"id": 2, "type": "single", "stem": "Melyik állítás NEM JELLEMZŐ a visszautasított szorongó gyerekekre?", "options": ["A szégyenlősségük miatt izolálódnak a csoportból", "Túlságosan sokat beszélnek", "Előfordulhatnak náluk pszichoszomatikus megbetegedések", "Jellemző rájuk az internalizáció"], "correct": ["Túlságosan sokat beszélnek"], "explanation": "A visszautasított szorongó/visszahúzódó gyerekre inkább szégyenlősség, gátoltság, izoláció és internalizáció jellemző.\nPszichoszomatikus tünetek is előfordulhatnak, mert a feszültség befelé fordul.\nA túl sok beszéd nem illik ehhez a típushoz; ez inkább aktívabb, impulzívabb vagy externalizáló viselkedés lenne."}, {"id": 3, "type": "single", "stem": "A társadalmi konvenciók megsértése már iskoláskorban is jelentősebb vétek, mint az erkölcsi szabályok megszegése", "options": ["Igen", "Nem"], "correct": ["Nem"], "explanation": "Az erkölcsi szabályok megszegése súlyosabb, mert mások jóllétéhez, kár okozásához, igazságossághoz kapcsolódik.\nA társadalmi konvenciók inkább közösségi megegyezések: hogyan illik viselkedni egy adott helyzetben.\nPélda: valakit bántani erkölcsi szabályszegés; nem megfelelően köszönni társadalmi konvenció megsértése."}, {"id": 4, "type": "pair", "stem": "Keresd meg az összetartozó párokat!", "pairs": [["Pszichológiai én", "6 éves kor"], ["alacsony önértékelés", "szociális izoláció, szomorúság, depresszió, rossz iskolai teljesítmény"], ["társaik által népszerűnek ítélt gyerekek", "kapcsolati agresszió"], ["Sullivan", "szociális fogyatékosságok"], ["kardinalitás", "számolási elv"]], "explanation": "6 éves kor körül már nemcsak külső jegyekkel, hanem egyszerűbb belső/pszichológiai jellemzőkkel is leírhatja magát a gyerek.\nAz alacsony önértékelés társas és teljesítményproblémákkal járhat: izoláció, szomorúság, depresszív tünetek, gyengébb iskolai teljesítmény.\nA társaik által népszerűnek ítélt gyerekek gyakran magas státuszúak, dominánsak, de nem feltétlenül kedveltek; kapcsolati agresszió is jellemző lehet rájuk.\nSullivan szerint a kortárskapcsolatok hiánya későbbi társas nehézségekhez, szociális hiányosságokhoz kapcsolódhat.\nA kardinalitás ismét a számolási elvekhez tartozik."}, {"id": 5, "type": "single", "stem": "Peti 5 éves. Ügyesen elszámol már 20-ig, azonban társas játék közben minden alkalommal meg kell még számolnia a pöttyöket a dobókockán, hogy mennyit lépjen a bábujával. Mire utal ez a jelenség?", "options": ["A számkonzerváció hiányára", "Nem jó az emlékezeti tevékenysége", "Az összeadás nehezen megy neki", "A kognitív fejlettsége nem az életkorának megfelelő"], "correct": ["A számkonzerváció hiányára"], "explanation": "Attól, hogy egy gyerek el tud számolni 20-ig, még nem biztos, hogy stabil a számfogalma.\nItt az a lényeg, hogy Peti nem ismeri fel stabilan a mennyiséget, hanem újra és újra számolnia kell.\nEz a mennyiség állandóságának, vagyis a számkonzervációnak a bizonytalanságára utal.\n5 éves korban ez még nem feltétlenül kóros, ezért nem az a jó válasz, hogy nem életkorának megfelelő a kognitív fejlettsége."}, {"id": 6, "type": "single", "stem": "5-7 éves korban, ébrenléti időszakban az ébrenléti hullámok aktivitására inkább az alfa aktivitás a jellemző.", "options": ["Igen", "Nem"], "correct": ["Nem"], "explanation": "Ebben az életkorban még inkább théta aktivitás jellemző.\nAz alfa aktivitás az idegrendszeri érés előrehaladtával erősödik.\nEzért az állítás túl koránra teszi az alfa dominanciát."}, {"id": 7, "type": "single", "stem": "A személyközi vonatkozások az önjellemzésekben 12 éves kor körül jelennek meg", "options": ["Igen", "Nem"], "correct": ["Igen"], "explanation": "Az énkép fejlődése fokozatos: először konkrét, külső jellemzők dominálnak.\nKésőbb megjelenik a társakkal való összehasonlítás.\n12 év körül már egyre fontosabb, hogy mások hogyan látnak engem, milyen vagyok kapcsolatokban, milyen szerepem van másokhoz képest."}, {"id": 8, "type": "pair", "stem": "Válaszd ki az összetartozó párokat!", "pairs": [["3-6 év", "egocentrikus nézőpont"], ["szociális-információs", "másoknak más nézőpontja lehet"], ["önreflektív", "mások helyzetébe lépés"], ["kölcsönös", "harmadik személy perspektívája"], ["szociális-konvencionális", "társadalmi konvenciók megértése"]], "explanation": "3-6 éves korban a gyerek még egocentrikus: nehezen érti, hogy másnak más nézőpontja lehet.\nA szociális-információs szinten már felismeri, hogy más másként láthatja a helyzetet, de még egyszerre kevés szempontot kezel.\nAz önreflektív szinten képes másik ember helyzetébe képzelni magát.\nA kölcsönös szerepvállalásnál már egy harmadik személy nézőpontjából is ráláthat a kapcsolatra.\nA szociális-konvencionális szinten társadalmi normák, konvenciók alapján is értelmezi az interakciókat."}, {"id": 9, "type": "pair", "stem": "Párosítsd a következő fogalmakat/neveket egymással!", "pairs": [["Jógyerek-orientáció", "konvencionális erkölcs"], ["társadalmi-szerződés orientáció", "Kohlberg"], ["motoros szabályok", "Piaget"], ["metakogníció", "Flavell"], ["visszautasított gyerekek", "negatív attribúció"]], "explanation": "A jógyerek-orientáció Kohlberg konvencionális szintjéhez tartozik: a gyerek fontosnak tartja, hogy mások jónak lássák.\nA társadalmi-szerződés orientáció szintén Kohlberg rendszerében szerepel, magasabb erkölcsi szinten.\nPiaget vizsgálta a játékszabályok fejlődését, ezért a motoros szabályok hozzá kapcsolódnak.\nFlavell a metakogníció alapfogalmához kapcsolódik: tudás a saját gondolkodásról, emlékezetről és stratégiákról.\nA visszautasított agresszív gyerekek gyakran negatív attribúcióval élnek: a társak viselkedését rosszindulatúnak értelmezik."}, {"id": 10, "type": "pair", "stem": "Párosítsd a következő fogalmakat/neveket egymással!", "pairs": [["Jógyerek-orientáció", "Kohlberg"], ["szándéketika", "9 éves kortól"], ["fejlődési kövérség", "pszichoanalitikus irányzat"], ["metakogníció", "Flavell"], ["törvények szerepe alá-fölérendeltségi viszonyok tisztázása", "retributív igazságosság"]], "explanation": "A jógyerek-orientáció Kohlberg erkölcsi fejlődéselméletéhez tartozik.\nA szándéketika azt jelenti, hogy a gyerek már nemcsak a tett következményét, hanem a szándékot is figyelembe veszi; ez kb. 9 éves kortól jellemző.\nA fejlődési kövérség pszichoanalitikus értelmezésben feszültséglevezetéshez, túlgondozáshoz, érzelmi szabályozáshoz kapcsolódhat.\nA metakogníció Flavellhez kapcsolódik.\nA retributív igazságosság a büntetés-jutalom, alá-fölérendeltségi viszony logikájához illik.\n11-25. kérdés"}, {"id": 11, "type": "single", "stem": "A személyes érintettség alacsonyabb szintű érvelést eredményez az erkölcsi gondolkodásmódban.", "options": ["Igen", "Nem"], "correct": ["Igen"], "explanation": "Ha a gyerek személyesen érintett egy helyzetben, nehezebben alkalmaz elvont, objektív erkölcsi szempontokat.\nIlyenkor inkább saját érdekei, érzelmei, közvetlen következmények alapján érvelhet.\nEzért lehet alacsonyabb szintű az erkölcsi gondolkodása."}, {"id": 12, "type": "single", "stem": "Az iskolaérett gyermek képes 15 percig a feladataira koncentrálni, azért, mert az iskoláskorban a szemantikus emlékezet rohamosan fejlődik", "options": ["Egyik állítás sem igaz", "Az első állítás igaz, a második hamis", "Az első állítás hamis, a második igaz", "Mindkét állítás igaz, de nincs kapcsolat közöttük", "Mindkét állítás igaz és kapcsolat van közöttük"], "correct": ["Mindkét állítás igaz, de nincs kapcsolat közöttük"], "explanation": "Az iskolaérettséghez valóban hozzátartozik bizonyos figyelmi kapacitás, önszabályozás és feladattartás.\nAz iskoláskorban a szemantikus emlékezet is fejlődik.\nA kettő között azonban nincs közvetlen oksági kapcsolat: a 15 perces koncentrációt inkább figyelmi és önszabályozási érettség magyarázza, nem a szemantikus emlékezet fejlődése."}, {"id": 13, "type": "single", "stem": "Melyik állítás igaz?", "options": ["A korai túltáplálás a meglévő zsírsejteket telíti", "5 éves korig ébrenléti állapotban több a théta aktivitás", "7 éves kor után a théta aktivitás gyakrabban jelenik meg ébrenléti állapotban", "A homloklebeny szerepe csökken az életkor előrehaladtával"], "correct": ["5 éves korig ébrenléti állapotban több a théta aktivitás"], "explanation": "A korai túltáplálás nem pusztán a meglévő zsírsejtek telítését jelenti; a zsírsejtek száma is változhat.\n7 éves kor után nem a théta aktivitás válik gyakoribbá, hanem az alfa aktivitás erősödik.\nA homloklebeny szerepe nem csökken, hanem az életkorral egyre fontosabbá válik a szabályozásban.\nEzért a helyes állítás az, hogy 5 éves korig ébrenléti állapotban több a théta aktivitás."}, {"id": 14, "type": "multi", "stem": "Mely állítások jellemzik leginkább a szülőkkel való kapcsolatot iskoláskorban?", "options": ["Az anya-gyermek interakciójának jelentős hatása van a gyermek kortárskapcsolatokban elfoglaltpozíciójára", "A szülők elképzelése a gyermek természetéről nem mutat jelentős változást az életkor előrehaladtával", "Az iskoláskori változásokra a szülői nevelés reflektál, amely eredményezi a kapcsolat rugalmas megváltozását", "A szülőkkel való interakció intenzitása nem változik iskoláskorban"], "correct": ["Az anya-gyermek interakciójának jelentős hatása van a gyermek kortárskapcsolatokban elfoglaltpozíciójára", "Az iskoláskori változásokra a szülői nevelés reflektál, amely eredményezi a kapcsolat rugalmas megváltozását"], "explanation": "A szülő-gyermek kapcsolat hat arra, hogyan működik a gyerek kortársai között.\nAz anya-gyermek interakció minősége összefügghet azzal, hogy a gyerek milyen helyet foglal el a kortárscsoportban.\nIskoláskorban a gyerek önállóbb lesz, ezért a szülői nevelésnek is alkalmazkodnia kell.\nNem igaz, hogy a szülőkkel való interakció intenzitása ne változna, és az sem, hogy a szülők elképzelései ne módosulnának."}, {"id": 15, "type": "single", "stem": "A gyermekek 10 éves korig alulbecsülik emlékezeti kapacitásukat", "options": ["Igen", "Nem"], "correct": ["Nem"], "explanation": "A kisebb gyerekek inkább túlbecsülik saját emlékezeti teljesítményüket.\nA metakognitív monitorozás még pontatlan: nem tudják jól megítélni, mennyit tudnak megjegyezni.\nKésőbb pontosabbá válik az önértékelésük."}, {"id": 16, "type": "single", "stem": "A következő állítások közül melyik jellemző leginkább a visszautasított gyerekekre?", "options": ["Nagy hatást gyakorolnak a csoport életére", "Csoportban nagyon vágynak a hatalomra", "Társas szituációkban nehezen boldogulnak", "Proszociálisak, jellemző rájuk az asszertivitás"], "correct": ["Társas szituációkban nehezen boldogulnak"], "explanation": "A tananyag szerint a visszautasított gyerekek társas helyzetekben ügyetlenek, és gyakran elutasítást kapnak.\nLehetnek agresszívek/externalizálók vagy szorongó-visszahúzódók/internalizálók.\nA proszociális, asszertív működés inkább a népszerű gyerekekre jellemző.\nA csoport életére gyakorolt nagy hatás és hatalomvágy inkább a domináns, státusz alapján népszerű gyerekekhez kapcsolható."}, {"id": 17, "type": "single", "stem": "Melyik időszakban figyelhető meg a gyerekek erkölcsi gondolkodásában az objektív felelősség?", "options": ["0-3 év", "3-9 év", "10 év felett", "7-10 év"], "correct": ["3-9 év"], "explanation": "Objektív felelősségnél a gyerek inkább a tett látható következményét nézi.\nNem a szándékot tartja elsődlegesnek, hanem például azt, hogy mekkora kár keletkezett.\nA szándék szerinti ítélkezés, vagyis szándéketika később, kb. 9 éves kortól válik jellemzőbbé."}, {"id": 18, "type": "single", "stem": "Melyik igazságossági fogalmat társítjuk az egyenlő elosztásra és objektív elbírálásra?", "options": ["disztributív igazságosság", "szubjektív szándék", "ekvitás", "retributív igazságosság"], "correct": ["disztributív igazságosság"], "explanation": "A disztributív igazságosság az elosztás igazságosságáról szól.\nKisiskoláskorban ez gyakran az egyenlőség elvével jelenik meg: mindenkinek ugyanannyi jár.\nAz ekvitás későbbi és árnyaltabb: figyelembe veszi az érdemet, szükségletet, teljesítményt.\nA retributív igazságosság a büntetés és jutalmazás kérdéséhez kapcsolódik."}, {"id": 19, "type": "single", "stem": "Adél 6 éves, anyukájával tortát sütnek. Pontosan meg tudja számolni hány szeletre vágta anyukája a tortát, azonban abban még bizonytalan, hogy melyikhez kellett több lisztet használni, ha egészben van a torta vagy ha szeletekre vágták. Mire utal a következő jelenség.", "options": ["az egocentrizmus csökkenésére", "horizontális eltolódásra a kognitív fejlődésben", "vertikális eltolódás a kognitív fejlődésben", "az ekvilibráció megjelenésére"], "correct": ["horizontális eltolódásra a kognitív fejlődésben"], "explanation": "A horizontális eltolódás azt jelenti, hogy a gyerek ugyanazt a logikai műveletet különböző tartalmakon nem egyformán tudja alkalmazni.\nAdél a darabszámot már kezeli, de az anyagmennyiség állandóságában még bizonytalan.\nEz nem vertikális eltolódás, mert nem új struktúra más műveletekkel való rekonstruálásáról van szó.\nNem egyszerűen az egocentrizmus csökkenése a lényeg, hanem a konzerváció különböző területeken való eltérő megjelenése."}, {"id": 20, "type": "single", "stem": "A számtudat megjelenésének bizonyítéka a mennyiség invarianciája", "options": ["Igen", "Nem"], "correct": ["Igen"], "explanation": "A számfogalom nem csak számnevek felsorolását jelenti.\nAkkor stabilabb a számtudat, ha a gyerek érti, hogy a mennyiség bizonyos átrendezések mellett is ugyanannyi marad.\nEz a mennyiség invarianciája, vagyis állandósága."}, {"id": 21, "type": "single", "stem": "Az iskoláskori baráti kapcsolatoknak jelentős szerepe van a fejlődésben, mivel akinek nincsenek támogató kortárskapcsolatai iskoláskorban, azoknak nehézségei lehetnek a felnőttkori intim kapcsolatok kialakítása során.", "options": ["Egyik állítás sem igaz", "Az első állítás igaz, a második hamis.", "Az első állítás hamis, a második igaz.", "Mindkét állítás igaz, de nincs összefüggés közöttük", "Mindkét állítás igaz és összefüggés van közöttük"], "correct": ["Mindkét állítás igaz és összefüggés van közöttük"], "explanation": "A helyes válasz: Mindkét állítás igaz és összefüggés van közöttük.\nA források alapján az iskoláskori baráti és kortárskapcsolatoknak valóban kiemelkedő és jelentős szerepe van a fejlődésben, mivel ezek segítik elő a társas kompetencia kialakulását, a későbbi romantikus kapcsolatok megalapozását, és érzelmi biztonságot nyújtanak az egyén számára.\nA két állítás közötti összefüggést több kutató elmélete is alátámasztja:\nSullivan szerint az iskoláskori barátságok a felnőttkori intimitás fontos előzményei, és ha ezek a kapcsolatok hiányoznak, az a későbbiekben úgynevezett „szociális fogyatékossághoz” vezethet az egyén életében.\nHatrup szintén úgy fogalmaz a barátság fejlődési funkciói kapcsán, hogy ezek az iskoláskori kapcsolatok a későbbi intim kapcsolatok modelljeként szolgálnak.\nTehát a gyermekkori kortárskapcsolatok megléte vagy hiánya egyértelműen és szorosan összefügg a felnőttkori intim kapcsolatok sikeres vagy nehézkes kialakításával."}, {"id": 22, "type": "single", "stem": "A „Mindenki azt kapja, amit megérdemel”-elve 7 éves korban jellemzi a gyerekeket.", "options": ["Igen", "Nem"], "correct": ["Nem"], "explanation": "Nem, ez az állítás nem igaz. A „mindenki megkapja, amit megérdemel” elve, amely az egyenlőségen és viszonosságon alapul, 10 éves kortól jellemzi a gyerekeket.\nDamon (1980) pozitív erkölcsi gondolkodásról szóló elmélete alapján a javak és a jutalmak elosztásának megítélése a következőképpen változik meg a gyermekeknél:\n5-7 éves korban: A gyerekek az egyenlő bánásmódot tartják szem előtt, azaz úgy gondolják, hogy „mindenkinek mindig ugyanannyit kell kapnia”. Szerintük a jutalom minden résztvevőnek egyformán jár, és még nem képesek figyelembe venni az enyhítő körülményeket.\n8-10 éves korban: Megjelenik az erkölcsi relativitás, ami azt jelenti, hogy a sajátos szükségletekkel rendelkező személyek (például a szegények) igényei már nagyobb hangsúlyt kapnak az elosztás során.\n10 éves kortól: Ekkor válik jellemzővé a viszonosság megértése, vagyis az a gondolkodásmód, hogy mindenki megkapja, amit megérdemel.\nTehát egy 7 éves gyermek erkölcsi gondolkodását a szigorú és feltétel nélküli egyenlőség (mindenkinek ugyanannyi jár), nem pedig az egyéni érdemek vagy megérdemeltség elve irányítja. Egészen 10 éves korukig minél többszempontúbbá válik a gondolkodásuk, annál jobban tudnak mérlegelni az erkölcsi döntésekben."}, {"id": 23, "type": "pair", "stem": "Párosítsd a következő fogalmakat/neveket egymással!", "pairs": [["fejlődési kövérség", "szülők közötti tartós feszültség miatt is kialakulhat, túlgondozás, családi problémák"], ["alultápláltság", "csökkenő kognitív érdeklődés, kisebb motiváció, szociális, fizikai és kognitív problémák"], ["reaktív kövérség", "kistestvér születése is kiválthatja, súlyos emocionális stressz"], ["ekvilibráció", "Piaget"], ["animizmus", "biológiai ismeretek hiánya"]], "explanation": "Fejlődési kövérség – szülők közötti tartós feszültség miatt is kialakulhat, túlgondozás, családi problémák.\nAlultápláltság – csökkenő kognitív érdeklődés, kisebb motiváció, szociális, fizikai és kognitív problémák.\nReaktív kövérség – kistestvér születése is kiválthatja, súlyos emocionális stressz. (Megjegyzés: a jegyzet a hirtelen fellépő, súlyos emocionális stresszre konkrét példaként a szülők válását vagy elvesztését említi, de pszichológiai értelemben a kistestvér születése is kiválthat ilyen reaktív reakciót).\nEkvilibráció – Piaget. Az egyensúlyi folyamatba való átlépés, amely Piaget kognitív fejlődéselméletének egyik kulcsfogalma.\nAnimizmus – biológiai ismeretek hiánya. (Susan Carey magyarázata alapján a gyermekek animizmusa, vagyis az élettelen dolgok élőlényként való felruházása a tudás és a biológiai ismeretek hiányából fakad)."}, {"id": 24, "type": "multi", "stem": "Válaszd ki a lehetőségek közül az iskoláskori testi fejlődés lehetséges magyarázatait! (több válasz is lehetséges)", "options": ["kéreg mielinizációja befejeződik", "a két félteke munkamegosztási kapcsolata megváltozik", "táplálkozási szokások megváltozása", "testméret gyarapodása", "théta-alfa aktivitás megváltozik"], "correct": ["kéreg mielinizációja befejeződik", "a két félteke munkamegosztási kapcsolata megváltozik", "théta-alfa aktivitás megváltozik"], "explanation": "A megadott felsorolásból a fejlődési változások bekövetkezésének lehetséges (elsősorban idegrendszeri) magyarázatai a források alapján a következők:\nA két félteke munkamegosztási kapcsolata megváltozik (ez a lateralizáció, amely kifinomultabb cselekvést és magasabb szintű gondolkodást tesz lehetővé).\nKéreg mielinizációja befejeződik (körülbelül 6-8 éves korra tehető, és ez idézi elő az agy területei közötti összeköttetések megváltozását, pontosítva az ingerületátadást).\nThéta-alfa aktivitás megváltozik (az ébrenléti hullámok aktivitásának mintázata alakul át, aminek következtében például csökken az alvásigény)."}, {"id": 25, "type": "multi", "stem": "Melyik állításigaz az információfeldolgozási elméletre? Válaszd ki a helyes válaszokat", "options": ["8-9 éves korig a gyerekek nem tudják megkülönböztetni az emlékezetet a többi kognitív funkciótól", "Az 5 éves gyerekek az emlékezeti kapacitásukról pontosabb előrejelzéseket tesznek, mint a mozgásos teljesítményükről", "Az elmélet szerint a kognitív fejlődést a megnövekedett tudással magyarázhatjuk", "Szemantikus emlékezet fejlődésében szerepe van a metakognitív képességnek"], "correct": ["8-9 éves korig a gyerekek nem tudják megkülönböztetni az emlékezetet a többi kognitív funkciótól", "Az elmélet szerint a kognitív fejlődést a megnövekedett tudással magyarázhatjuk"], "explanation": "8-9 éves korig a gyerekek nem tudják megkülönböztetni az emlékezetet a többi kognitív funkciótól (Igaz):Ezt Lovett és Flavell (1990) metakognícióval kapcsolatos kutatása támasztja alá. A vizsgálatukban 1., 3. és 8. osztályos gyerekeket, valamint egyetemistákat teszteltek azzal kapcsolatban, hogy különbséget tudnak-e tenni a megértést, illetve a puszta felidézést (emlékezetet) segítő stratégiák és feladatok között. Az eredmények rávilágítottak, hogy az 1. osztályosok (6-7 évesek) még nem tudtak különbséget tenni ezen kognitív funkciók között, a helyes választ csak a 3. osztályosok (8-9 évesek) és az annál idősebbek tudták megadni.\nAz elmélet szerint a kognitív fejlődést a megnövekedett tudással magyarázhatjuk (Igaz): Piaget szakaszos elméletével szemben az információfeldolgozási keretrendszerhez tartozó (például Chi és Glaser-féle) szakértőségi megközelítések a kognitív fejlődést a mennyiségi változásokkal, azaz a megnövekedett kapacitással, a jobb stratégiákkal és a megnövekedett tudással magyarázzák. A források kiemelik, hogy az idősebb és fiatalabb gyerekek közötti minőséginek tűnő ugrást valójában a megszerzett tudás, a tapasztalat növekedése és a hatékonyabb információ-feldolgozás eredményezi.\nMiért hamis a többi állítás?\nAz 5 éves gyerekek az emlékezeti kapacitásukról pontosabb előrejelzéseket tesznek, mint a mozgásos teljesítményükről: Hamis. A jegyzet rámutat, hogy a gyerekek egészen 10 éves korukig túlbecsülik az emlékezeti kapacitásukat. Sokkal pontosabban tudják bejósolni azokat a teljesítményeket (például a mozgást), amelyekben már van tapasztalatuk.\nSzemantikus emlékezet fejlődésében szerepe van a metakognitív képességnek: Bár a metakogníció a világra, a személyekre és a feladatokra vonatkozó tudást is magában foglalja, a források nem említik konkrétan és közvetlenül a szemantikus emlékezet fejlődése és a metakognitív képesség közötti specifikus ok-okozati összefüggést.\n26-40. kérdés"}, {"id": 26, "type": "single", "stem": "A szabályjátékban az asszimiláció felé való elmozdulást figyelhetjük meg", "options": ["Igen", "Nem"], "correct": ["Nem"], "explanation": "A szabályjátékban a gyerek nem a külvilágot igazítja saját sémáihoz, hanem saját viselkedését igazítja a szabályokhoz.\nEz inkább akkomodáció.\nA szabályjátékban csökken az egocentrikus szemlélet, és nő a külső, közös szabályokhoz való alkalmazkodás."}, {"id": 27, "type": "single", "stem": "Az iskolás gyermek énképe állandó, minden helyzetben ugyanolyan.", "options": ["Igen", "Nem"], "correct": ["Nem"], "explanation": "Iskoláskorban az énkép differenciálódik.\nA gyerek különböző területeken másképp láthatja magát: iskolai teljesítmény, kortárskapcsolatok, család, fizikai képességek, megjelenés.\nEzért az énkép nem egységes és nem minden helyzetben azonos."}, {"id": 28, "type": "single", "stem": "Melyik állítás igaz az énkép alakulására?", "options": ["A periférikus vonások is ugyanolyan jelentősek mások megjelenésében, mint a központi vonások", "Az énkép szerveződése nem mutat életkori változásokat", "Az énkép egy egydimenziós jelenség, így alapvetően egy negatív családi énkép minden más területre negatív hatást gyakorol", "Az énkép akkor tud leginkább fejlődni a tárgykapcsolati elmélet szerint, ha az anya egyre kevésbé jól reagál a gyermek szükségleteikre"], "correct": ["Az énkép akkor tud leginkább fejlődni a tárgykapcsolati elmélet szerint, ha az anya egyre kevésbé jól reagál a gyermek szükségleteikre"], "explanation": "A tárgykapcsolati elmélet, különösen Winnicott, az anya-gyermek kapcsolat minőségét tartja meghatározónak az én fejlődésében.\nA válasz megfogalmazása kicsit félrevezető: nem arról van szó, hogy az anya rosszul reagáljon.\nA lényeg inkább az, hogy a tökéletes illeszkedés fokozatosan csökken, ami segíti az elkülönülést és az önálló én fejlődését.\nA többi válasz hibás: az énkép nem egydimenziós, nem változatlan, és a központi vonások fontosabbak a benyomásalkotásban, mint a periférikusak."}, {"id": 29, "type": "single", "stem": "Piaget erkölcsi fejlődés elméletében sokat foglalkozik a szülői nevelési stílusok hatásaival.", "options": ["Igen", "Nem"], "correct": ["Nem"], "explanation": "Piaget az erkölcsi fejlődést főleg a kognitív fejlődés, a szabályjátékok és a gyermeki szabályfelfogás felől magyarázza.\nNála fontos a heteronóm és autonóm erkölcs különbsége.\nA szülői nevelési stílusok részletes vizsgálata nem Piaget elméletének központi eleme."}, {"id": 30, "type": "single", "stem": "A társakkal való összehasonlítás elsősorban 9 éves kor körül jelenik meg", "options": ["Igen", "Nem"], "correct": ["Nem"], "explanation": "A tananyag alapján a társas összehasonlítás kb. 8 éves kor körül jelenik meg erőteljesebben.\nEkkor a gyerek már másokhoz viszonyítva is értékeli saját teljesítményét és tulajdonságait.\nEz az énkép fejlődésének fontos lépése."}, {"id": 31, "type": "single", "stem": "Azok az első osztályos diákok, akik ügyesebbek a szövegértéses feladatokban, jobbak a szófelismerésben is", "options": ["Igen", "Nem"], "correct": ["Nem"], "explanation": "A szófelismerés/dekódolás és a szövegértés nem teljesen ugyanaz a folyamat.\nAz olvasás korai szakaszában a dekódolás fontos, de a szövegértéshez már célmegértés, stratégiahasználat és metakognitív működés is kell.\nA tananyagban inkább az szerepel, hogy a metakogníció segíti az olvasás céljának és a szövegértésnek a fejlődését.\nEzért a kérdés állítása így túl leegyszerűsítő."}, {"id": 32, "type": "single", "stem": "A metakogníció hozzájárul a kognitív kísérletezések sikeréhez, mivel a metakogníció magában foglalja a stratégiákról való tudást is.", "options": ["Egyik állítás sem igaz", "Az első állítás igaz, a második hamis.", "Az első állítás hamis, a második igaz.", "Mindkét állítás igaz, de nincs összefüggés köztük", "Mindkét állítás igaz és van összefüggés köztük"], "correct": ["Mindkét állítás igaz és van összefüggés köztük"], "explanation": "A metakogníció azt jelenti, hogy a gyerek tud a saját gondolkodásáról, emlékezetéről, tanulási folyamatairól.\nRésze a stratégiákról való tudás: mit hogyan érdemes megjegyezni, ellenőrizni, megoldani.\nEz közvetlenül segíti a kognitív feladatmegoldást és a kísérletezést.\nEzért itt nemcsak mindkét állítás igaz, hanem oksági kapcsolat is van köztük."}, {"id": 33, "type": "single", "stem": "A heteronóm erkölcs időszaka 12 éves kor felett figyelhető meg.", "options": ["Igen", "Nem"], "correct": ["Nem"], "explanation": "A heteronóm erkölcs a korábbi időszakra jellemző.\nIlyenkor a gyerek a szabályokat külső, felnőtti tekintélyből származónak, megváltoztathatatlannak látja.\n12 éves kor felett inkább az autonóm erkölcs kerül előtérbe: a szabályok kölcsönös megállapodáson alapulhatnak és átalakíthatók."}, {"id": 34, "type": "single", "stem": "Általános iskola 2. osztályában gyakran meg lehet figyelni, hogy a gyerekek dolgozatírás közben eltakarják válaszaikat a padtársuk elől. Mire utal ez a jelenség?", "options": ["A tekintélyszemélyek elvárásának való megfelelés igényére", "Az egocentrizmus csökkenésére", "A társas összehasonlítás jelenségére", "Az ekvilibráció jelenségére"], "correct": ["A társas összehasonlítás jelenségére"], "explanation": "A gyerekek ilyenkor már figyelik, hogy a másik hogyan teljesít, mit lát belőlük, miben jobbak vagy rosszabbak.\nA válasz eltakarása azt jelzi, hogy a teljesítmény összehasonlíthatóvá válik a társakkal.\nEz nem elsősorban a tekintélyszemélynek való megfelelés, hanem a társas összehasonlítás."}, {"id": 35, "type": "single", "stem": "7 éves korban a gyerekek képzetek szintjén oldják meg a sorbarendezési feladatokat", "options": ["Igen", "Nem"], "correct": ["Igen"], "explanation": "A sorbarendezési feladatoknál a gyerek már képes mentálisan elrendezni az elemeket.\n7 éves kor körül megjelenik, hogy nem pusztán próbálgatással, hanem képzetek szintjén dolgozik.\nEz a konkrét műveleti gondolkodás felé való átmenethez kapcsolódik."}, {"id": 36, "type": "single", "stem": "A magas önértékelés gyakran jár együtt kapcsolati nehézséggel.", "options": ["Igen", "Nem"], "correct": ["Nem"], "explanation": "Az állítás hamis.\nA források alapján a kapcsolatteremtési gondok és a szociális izoláció az alacsony önértékeléssel járnak együtt, olyan további negatívumok mellett, mint a szomorúság, a depresszió és a rossz iskolai teljesítmény.\nEzzel szemben a magas önértékelés kifejezetten pozitív dolgokkal párosul: nagyobb önbizalommal, boldogsággal, az élettel való megelégedéssel, vezetői ambíciókkal és azzal, hogy az egyén jó benyomást tesz másokra."}, {"id": 37, "type": "single", "stem": "A kortársakkal való konformitás 14 éves korban a legerősebb", "options": ["Igen", "Nem"], "correct": ["Nem"], "explanation": "Az állítás hamis.\nA források alapján az általános kortársi konformitás – vagyis az az igény, hogy a serdülő „olyan legyen, mint a többi” – a 11-13 éves korosztályra a legjellemzőbb. Később (tehát 14 éves kor környékén) már inkább a nonkonformitás jelenik meg, amikor a cél az, hogy a fiatal „más legyen, mint a többiek”.\nÉrdemes azonban megjegyezni Berndt (1979) kutatását, amely különbséget tesz a konformitás irányai között:\nA pozitív, proszociális nyomásra való konformitás 11-12 éves korban a legerősebb.\nA negatív, antiszociális nyomásra való konformitás (például antiszociális cselekvésekben való részvétel) viszont valóban 14-15 éves korban éri el a csúcsát.\nÖsszességében tehát az általános konformitás 11-13 éves korban a legerősebb, 14 évesen csupán az antiszociális nyomásnak való megfelelés válik kifejezettebbé."}, {"id": 38, "type": "single", "stem": "Serdülőkorban a hipofízis gátló hatása csökken.", "options": ["Igen", "Nem"], "correct": ["Igen"], "explanation": "Az állítás az általános biológiai ismeretek alapján igaz, azonban a rendelkezésre álló források és a beszélgetésünk története nem tartalmaznak semmilyen információt a hipofízisről (agyalapi mirigyről) és annak serdülőkori működéséről.\nFelhívom a figyelmed, hogy a következő magyarázat a megadott forrásokon kívülről származik, ezért érdemes lehet függetlenül is ellenőrizned:\nGyermekkorban a hipofízis nagyon érzékeny a nemi hormonok negatív visszacsatolására, ami erős gátló hatást fejt ki a további hormontermelésre. Serdülőkorban (a pubertás kezdetén) ez a gátló hatás valóban lecsökken (az agy \"fékrendszere\" kiold). Ennek következtében a hipofízis serkentő hormonokat kezd kibocsátani, ami megemeli a nemi hormonok szintjét, és ezzel elindítja a serdülőkori szexuális és testi érést."}, {"id": 39, "type": "single", "stem": "Mit jelent az identitáskontroll elmélet?", "options": ["A szüleikkel a szabadidő eltöltésével kapcsolatban sokat beszélnek", "A fiatalok a meghozott döntéseiket folyamatosan felülbírálják", "Mindig mások véleményét meghallgatják a döntésükkel kapcsolatban (csak a ref. szem.)", "Ellenőrzés alatt tartják az életüket"], "correct": ["A fiatalok a meghozott döntéseiket folyamatosan felülbírálják"], "explanation": "A források alapján Kerpelman és munkatársai (1997) identitáskontroll elmélete az elköteleződés kiértékelését foglalja magában. Az elmélet rávilágít arra, hogy a fiatalok szoros kölcsönhatásban állnak a környezetükkel, és a környezetből érkező visszajelzések hatására folyamatosan értékelik, felülbírálják a már meghozott döntéseiket (elköteleződéseiket).\n(Kiegészítésként: A listádban szereplő harmadik állítás, miszerint a fiatal \"mindig mások – például referenciaszemélyek – véleményét hallgatja meg a döntésével kapcsolatban\", Berzonsky normatív identitás-stílusára jellemző, nem pedig az identitáskontroll elméletre.)"}, {"id": 40, "type": "single", "stem": "Milyen tényező akadályozhatja, hogy a serdülő identitásával kapcsolatos döntéseit meghozza", "options": ["Az explorációs folyamat", "A nemi érés időpontja", "A sérthetetlenség illúziója –", "Személyes kifejezőerőt nélkülöző elköteleződés"], "correct": ["Személyes kifejezőerőt nélkülöző elköteleződés"], "explanation": "Az identitással kapcsolatos döntéshozatal a pszichológiai szakirodalomban az elköteleződés (választás) fogalmának felel meg. Waterman (1982) elmélete alapján az igazi, sikeres elköteleződés magában foglalja a személyes kifejezőerőt.\nHa egy serdülő elköteleződése nélkülözi ezt a személyes kifejezőerőt, az azt jelenti, hogy a valódi, hiteles identitásdöntés meghozatalát különböző tényezők akadályozták vagy torzították. A források meg is nevezik ezeket az akadályozó okokat, amelyek egy felszínes (személyes kifejezést nélkülöző) döntéshez vezetnek:\nA környezet korlátozza a fiatal lehetőségeit.\nA környezet a társadalmilag elfogadható választások irányába tereli őt.\nA pillanatnyi élvezetek előtérbe helyezése.\nA lehetséges nehézségektől és veszélyektől való félelem.\nEzek a tényezők tehát meggátolják a serdülőt abban, hogy a saját, belsőleg megélt identitásával kapcsolatos hiteles döntéseket hozza meg.\nMiért nem a többi opció a helyes válasz?\nAz explorációs folyamat: A felfedezés (exploráció) alapvetően nem akadályozza, hanem éppen elősegíti az identitás kialakulását és az elköteleződést (például Grotevant és Meeus elméletei alapján). Csak egyetlen speciális esetben válik akadállyá: ha úgynevezett „maladaptív” vagy rágódó (ruminatív) explorációba csap át, de az opció ezt a negatív jelzőt nem tartalmazza.\nA sérthetetlenség illúziója: Ez a fogalom a serdülőkori egocentrizmushoz és az énkép (self-concept) fejlődéséhez tartozik (Elkind elmélete). Bár a források szerint ez vezethet úgynevezett „hamis én” felfogáshoz, a szakirodalom nem az identitásbeli döntések (elköteleződések) közvetlen akadályaként tartja számon, sőt, Lapsley szerint a képzeletbeli közönség és a személyes mítoszok teremtése akár előremutató társas fejlődési lépés is lehet.\nA nemi érés időpontja: Ez egy biológiai tényező, amely a testi fejlődés és a fizikai énkép szempontjából meghatározó, de az identitás-elméletek nem mint a döntéshozatalt akadályozó faktort említik.\n41-50. kérdés"}, {"id": 41, "type": "single", "stem": "A korai zárók egy hosszú explorációs folyamat után köteleződnek el.", "options": ["Igen", "Nem"], "correct": ["Nem"], "explanation": "A korai zárás lényege, hogy nincs valódi krízis vagy hosszú exploráció.\nA fiatal többnyire szülői vagy más referencia-személyi elvárások mentén köteleződik el.\nEzért a hosszú keresési folyamat nem a korai zárókra, hanem inkább a moratórium állapotára jellemző."}, {"id": 42, "type": "single", "stem": "Regresszív identitásfejlődés során a fiatal mindig diffúz állapotba esik vissza.", "options": ["Igen", "Nem"], "correct": ["Nem"], "explanation": "A regresszió identitásfejlődésben visszalépést jelenthet, de nem kizárólag diffúz állapotba.\nAz identitásállapotok között többféle mozgás lehetséges.\nA „mindig” szó miatt az állítás túl erős és ezért hibás."}, {"id": 43, "type": "single", "stem": "A nemi érés időpontját befolyásolhatja, hogy milyen típusú testmozgást végeznek.", "options": ["Igen", "Nem"], "correct": ["Igen"], "explanation": "A pubertás kezdetét genetikai és környezeti tényezők egyaránt befolyásolják.\nA környezeti tényezők között szerepelhet a táplálkozás, stressz, szociális-gazdasági háttér és testmozgás.\nEzért a testmozgás típusa is hatással lehet a nemi érés időpontjára."}, {"id": 44, "type": "single", "stem": "Melyik állítás igaz a sérthetetlenség illúziójára?", "options": ["Kifejezetten gyermekkorban megjelenő sajátosság, amely összefüggésben van a szülők omnipotens szerepével", "Természetes énvédő mechanizmus, amely minden életkorban jelentős", "Az identitásalakítási folyamat jelentős eleme", "Azt jelenti, hogy a fiatal különleges képességekkel rendelkezik"], "correct": ["Természetes énvédő mechanizmus, amely minden életkorban jelentős"], "explanation": "A tesztsor logikája szerint ez a helyes válasz.\nA sérthetetlenség illúziója azt jelenti, hogy az ember úgy érezheti: vele kevésbé történhet baj, mint másokkal.\nSerdülőkorban ez különösen látványos lehet kockázatvállalásnál, de énvédő működésként tágabban is értelmezhető.\nNem azt jelenti, hogy a fiatal ténylegesen különleges képességekkel rendelkezik."}, {"id": 45, "type": "single", "stem": "A serdülők képesek egyre hatékonyabb tanulási stratégiákat alkalmazni, mert jobban használják az elvont verbális fogalmakat.", "options": ["Egyik állítás sem igaz", "Az első állítás igaz, a második hamis.", "Az első állítás igaz, a második hamis.", "Mindkét állítás igaz, de nincs összefüggés köztük", "Mindkét állítás igaz és van összefüggés köztük"], "correct": ["Mindkét állítás igaz, de nincs összefüggés köztük"], "explanation": "A serdülők valóban hatékonyabb tanulási stratégiákat tudnak alkalmazni.\nAz is igaz, hogy jobban használják az elvont verbális fogalmakat.\nA tananyagban azonban ezek külön magyarázati vonalak: az információfeldolgozásnál a memória, stratégiák és metakogníció, a nyelvi fejlődésnél az elvont verbális fogalmak szerepelnek.\nEzért mindkettő igaz, de az egyik nem közvetlen oka a másiknak."}, {"id": 46, "type": "single", "stem": "Az identitásalakítás folyamatára jelentős hatást gyakorol a közvetlen környezet elvárása, mivel a serdülő identitásfejlődésében a referenciaszemélyek visszajelzésének meghatározó szerepe van", "options": ["Egyik állítás sem igaz", "Az első állítás igaz, a második hamis.", "Az első állítás igaz, a második hamis.", "Mindkét állítás igaz, de nincs összefüggés köztük", "Mindkét állítás igaz és van összefüggés köztük"], "correct": ["Mindkét állítás igaz és van összefüggés köztük"], "explanation": "A serdülő identitásfejlődésében a közvetlen környezet elvárásai fontosak.\nA referenciaszemélyek - szülők, fontos felnőttek, kortársak - visszajelzései befolyásolják, hogy a serdülő hogyan látja önmagát.\nHa ezek a visszajelzések nem illeszkednek a kialakított identitáshoz, új exploráció indulhat.\nEzért a két állítás között közvetlen kapcsolat van."}, {"id": 47, "type": "single", "stem": "Serdülőkorban a fiúk önértékelése általában alacsonyabb a testi változások miatt.", "options": ["Igen", "Nem"], "correct": ["Nem"], "explanation": "A testi változások miatti önértékelési nehézségek inkább a lányokra jellemzőek.\nKülönösen a korai érés lehet megterhelő lányoknál: testkép, másodlagos nemi jellegek, társas reakciók miatt.\nFiúknál a korai érés sokszor inkább státuszelőnnyel, népszerűséggel is járhat, bár lehetnek negatívumai is."}, {"id": 48, "type": "pair", "stem": "Párosítsd a következő fogalmakat/neveket egymással!", "pairs": [["Moratórium", "keresési folyamat"], ["Marcia", "négy identitásállapot"], ["epigenetikus elv", "fejlődési krízis"], ["MAMA ciklus", "személyiség nyitottsága"], ["Anna Freud", "autonómia"]], "explanation": "A moratórium az az állapot, amikor a fiatal még keres, explorál, de nem köteleződött el véglegesen.\nMarcia négy identitásállapotot különít el: diffúz identitás, korai zárás, moratórium, valódi/elért identitás.\nErikson epigenetikus elve szerint a fejlődési krízisek csírái már jelen vannak, de a környezet és élethelyzetek hatására bontakoznak ki.\nA MAMA ciklus a moratórium és elért identitás váltakozását jelenti: új élethelyzetekben új keresés indulhat.\nAnna Freud serdülőkor kapcsán az autonómia, leválás, individuáció kérdéseihez kapcsolódik."}, {"id": 49, "type": "pair", "stem": "Párosítsd a következő fogalmakat/neveket egymással!", "pairs": [["Teljesítménygátlás", "Vikár György"], ["preszuicidális szindróma", "agresszió gátolttá válása"], ["deficites társas készségek", "alkalmazkodási zavarok"], ["Anna Freud", "fixáció"], ["maladaptív exploráció", "szorongásos tünetek"]], "explanation": "Vikár Györgyhöz kapcsolódnak a serdülőkori krízisek kezdeti panaszai, például teljesítménygátlás, beilleszkedési zavarok, autoritáskrízis.\nA preszuicidális szindrómában Ringel szerint fontos elem az agresszió gátolttá válása, beszűkülés és öngyilkossági fantáziák.\nA deficites társas készségek miatt a serdülő nehezebben illeszkedik be, ami alkalmazkodási zavarokhoz vagy kompenzációs viselkedésekhez vezethet.\nAnna Freudnál a serdülőkori fejlődésben megjelenhet fixáció vagy visszacsúszás korábbi működésmódokhoz.\nA maladaptív, ruminatív exploráció körben forgó keresés: nincs előrehaladás, ezért szorongásos-depresszív tünetekhez kapcsolódhat."}, {"id": 50, "type": "pair", "stem": "Párosítsd a következő fogalmakat/neveket egymással!", "pairs": [["Serdülőkori egocentrizmus", "képzeletbeli közönség"], ["autoritáskrízis", "lógás, iskolai hiányzások"], ["korai zárás", "Marcia"], ["exploráció", "moratórium"]], "explanation": "A serdülőkori egocentrizmus egyik megnyilvánulása a képzeletbeli közönség: a serdülő úgy érzi, mások folyamatosan figyelik és értékelik.\nAz autoritáskrízis a tekintélyszemélyekkel szembeni konfliktusokban, iskolai lógásban, szabályszegésben jelenhet meg.\nA korai zárás Marcia identitásállapotai közé tartozik.\nAz exploráció a keresési folyamat, amely leginkább a moratórium állapotában aktív."}, {"id": 51, "type": "single", "stem": "Melyik állítás jellemzi legjobban a serdülők gondolkodását?", "options": ["A metakognitív gondolkodásuk még fejletlen", "Nem tudnak a jövőjükről tisztán gondolkodni", "Módszeres feladatmegoldás jellemzi őket", "A konkrét analógiák megoldásában jobban teljesítenek"], "correct": ["Módszeres feladatmegoldás jellemzi őket"], "explanation": "A serdülőkori kognitív fejlődésben megjelenik a formális műveleti gondolkodás.\nPiaget és Inhelder klasszikus feladataiban a 14 évesek már módszeresen próbálják ki a lehetőségeket, például a vegyszerek keverésénél az összes lehetséges kombinációt végiggondolják.\nEzért nem az a lényeg, hogy a metakogníció fejletlen lenne, hanem az, hogy egyre tudatosabb, tervszerűbb, hipotéziseket használó gondolkodás jelenik meg."}, {"id": 52, "type": "single", "stem": "Az énazonosságtudat egy szilárd időperspektívát is tartalmaz, amely a múlt-jelen-jövő egységben látását jelenti.", "options": ["Egyik állítás sem igaz", "Az első állítás igaz, a második hamis.", "Az első állítás igaz, a második hamis.", "Mindkét állítás igaz, de nincs összefüggés köztük", "Mindkét állítás igaz és van összefüggés köztük"], "correct": ["Mindkét állítás igaz és van összefüggés köztük"], "explanation": "Az énazonosságtudat nemcsak azt jelenti, hogy a serdülő tudja, kicsoda, hanem azt is, hogy önmagát időben folytonosnak éli meg.\nA szilárd időperspektíva azt jelenti, hogy a múltbeli tapasztalatokat, a jelenlegi önképet és a jövőre vonatkozó terveket egységben látja.\nEzért a két állítás között közvetlen kapcsolat van."}, {"id": 53, "type": "single", "stem": "A biológiai serdülés a lányoknál 13 éves korban kezdődik", "options": ["Igen", "Nem"], "correct": ["Nem"], "explanation": "A biológiai serdülés lányoknál általában 13 éves kor előtt indul el.\nA 13 év inkább egy fontos pubertáskori eseményhez, például a menstruáció megjelenésének időszakához kapcsolható, de nem a teljes biológiai serdülés kezdete.\nEzért az állítás így túl későre teszi a serdülés kezdetét."}, {"id": 54, "type": "single", "stem": "A moratórium állapotában a serdülő éppen az identitáskrízisét éli meg", "options": ["Igen", "Nem"], "correct": ["Igen"], "explanation": "Marcia identitásállapotai közül a moratórium az aktív keresés, exploráció állapota.\nIlyenkor a serdülő még nem köteleződött el véglegesen, hanem alternatívákat mérlegel.\nEzért mondható, hogy a moratórium állapotában éppen identitáskrízist él meg."}, {"id": 55, "type": "single", "stem": "A köztiagy szerepe nagyon jelentős a serdülőkori érési folyamatok beindulásáért.", "options": ["Igen", "Nem"], "correct": ["Igen"], "explanation": "A serdülőkori testi-biológiai változások hormonális szabályozáshoz kapcsolódnak.\nA köztiagy, különösen a hipotalamusz, fontos szerepet játszik a hormonális folyamatok beindításában és szabályozásában.\nEzért a köztiagy szerepe jelentős a serdülőkori érési folyamatok elindulásában."}, {"id": 56, "type": "single", "stem": "Melyik állítás jellemző a korai zárókra?", "options": ["Nagyon erőteljes hatást gyakorolnak rájuk a szülők.", "Éppen az identitás krízisüket élik át.", "Figyelmen kívül hagyják a döntéseik meghozatala során a referencia személyek véleményét", "Nem tudnak elköteleződni."], "correct": ["Nagyon erőteljes hatást gyakorolnak rájuk a szülők."], "explanation": "A korai zárók elköteleződnek, de nem saját hosszú exploráció után.\nDöntéseikben erős lehet a szülői vagy referenciaszemélyi befolyás.\nNem éppen identitáskrízist élnek át - az inkább moratórium.\nNem az jellemző rájuk, hogy nem tudnak elköteleződni, mert éppen elköteleződtek, csak nem saját keresés alapján."}, {"id": 57, "type": "single", "stem": "Az identitáskontroll elmélet során a fiatalok a meghozott döntéseiket felülvizsgálják.", "options": ["Igen", "Nem"], "correct": ["Igen"], "explanation": "Az identitáskontroll lényege a folyamatos összevetés: az identitás és a környezeti visszajelzések illeszkednek-e egymáshoz.\nHa nem illeszkednek, akkor a fiatal újragondolhatja döntéseit.\nEzért az állítás helyes."}, {"id": 58, "type": "single", "stem": "Hogyan nevezzük azt a folyamatot, amikor a figyelem fókuszát az egyén céljai irányítják?", "options": ["Endogén figyelmi orientáció", "Exogén figyelmi orientáció", "Endogén jutalmazási rendszer", "Extrovertált működésód"], "correct": ["Endogén figyelmi orientáció"], "explanation": "Endogén figyelmi orientáció esetén a figyelmet belső célok, szándékok, elvárások irányítják.\nExogén orientáció esetén külső inger ragadja meg a figyelmet.\nEzért a célvezérelt figyelmi fókusz endogén."}, {"id": 59, "type": "single", "stem": "A nukleáris családok jelenléte a kutatások alapján vitathatatlanul modern kori jellegzetesség", "options": ["Igen", "Nem"], "correct": ["Nem"], "explanation": "A nukleáris család nem kizárólag modern kori jelenség.\nA családformák történetileg és kulturálisan változatosak, de nem lehet azt mondani, hogy a nukleáris család vitathatatlanul csak modern sajátosság.\nA „vitathatatlanul” szó miatt az állítás különösen túlzó."}, {"id": 60, "type": "single", "stem": "A diffúz identitásstílusra jellemző a vágyteljesítő gondolkodás, mivel a diffúz stílusú személyeknek nincsenek világos céljaik és terveik.", "options": ["Egyik állítás sem igaz", "Az első állítás igaz, a második hamis.", "Az első állítás igaz, a második hamis.", "Mindkét állítás igaz, de nincs összefüggés köztük", "Mindkét állítás igaz és van összefüggés köztük"], "correct": ["Mindkét állítás igaz és van összefüggés köztük"], "explanation": "A diffúz/elkerülő identitásstílusra jellemző a halogatás, problémák elkerülése és bizonytalan célok.\nA vágyteljesítő gondolkodás ehhez illeszkedő megküzdési mód: inkább elképzeli vagy elhárítja a problémát, mint hogy aktívan megoldaná.\nMivel nincsenek világos célok és tervek, nagyobb eséllyel jelenik meg ez a megküzdés.\nEzért nemcsak mindkét állítás igaz, hanem összefüggés is van köztük."}, {"id": 61, "type": "single", "stem": "Maladaptív megküzdésre, és elutasító nevelési stílusra utal, ha a szülőt idegesíteni kezdi kisgyermeke sírása", "options": ["Igen", "Nem"], "correct": ["Nem"], "explanation": "Önmagában az, hogy a szülőt idegesíti a sírás, még nem bizonyít maladaptív megküzdést vagy elutasító nevelési stílust.\nA tartós, következetesen elutasító, bántalmazó vagy érzéketlen reakció lenne problémás.\nEgy egyszeri vagy természetes feszültségreakció nem elég ilyen következtetéshez."}, {"id": 62, "type": "single", "stem": "Milyen szintű fejlődési szakaszok/ciklusok zajlanak egy család életében egymással párhuzamosan, egymásba ágyazottan?", "options": ["Egyéni, párkapcsolati, családi", "Biológiai, kognitív, érzelmi", "Testi, társas, erkölcsi", "Szülői, gyermeki, nagyszülői"], "correct": ["Egyéni, párkapcsolati, családi"], "explanation": "A család fejlődése több szinten történik egyszerre.\nAz egyéni szint az egyes családtagok életkori és személyes fejlődését jelenti.\nA párkapcsolati szint a szülőpár vagy partnerkapcsolat változásaira utal.\nA családi szint az egész családrendszer működésének, szerepeinek, életciklusainak változását jelenti."}, {"id": 63, "type": "single", "stem": "A következő esetleírás kapcsán válaszd ki, hogy milyen serdülőkori jellegzetességet azonosíthatunk benne! József 16 éves, 10. osztályos középiskolai diák. Eddig elég jól tanult, a szülei szerint jó fiú volt, de az év elejétől igen megváltozott. Sorozatosan rossz jegyeket visz haza, és a szülők szerint rossz társaságba került: minden hétvégén bulizni megy, ahol alkoholizálnak, gyakran részegen megy haza. Eddig azt a foglalkozást akarta választani, amit az apja, de most fogalma sincs arról, hogy mi akar lenni. Gyakran rosszkedvű és lehangolt. Keveset tartózkodik otthon, alig szól a szülőkhöz, a tanácsukat sem akarja meghallgatni. A szülők eddig igen keményen és következetesen nevelték a fiút, de most tehetetlennek érzik magukat.", "options": ["serdülőkori nemi érés", "autoritáskrízis", "serdülőkori deviancia", "diffúz identitás"], "correct": ["autoritáskrízis"], "explanation": "A leírásban erősen megjelenik a szülőkkel és tekintélyekkel szembeni eltávolodás: nem hallgat a tanácsokra, keveset van otthon, konfliktusosabbá válik.\nA teljesítményromlás, lógás/szabályszegő közeg, alkoholhasználat is illeszkedhet autoritáskrízishez.\nFelmerülhetne identitásprobléma is, mert nem tudja, mi akar lenni, de az eset központi eleme a tekintélyhez való viszony megváltozása.\nEzért a legjobb válasz: autoritáskrízis."}, {"id": 64, "type": "multi", "stem": "A következő esetleírás kapcsán válaszd ki, hogy milyen serdülőkori jellegzetességet azonosíthatunk benne! Több válasz is lehetséges!\nEgy ismerősöd mesél 16 éves lányáról, aki az utóbbi időben nagyon befelé forduló lett. Úgy érzi, nem találja vele a hangot. Nem vesz részt a közös étkezéseken, néha úgy tűnik neki, hogy órákat tölt bezárkózva a fürdőszobába. Egyre sápadtabb és vékonyabb lett az utóbbi időben. Sok változás nem volt a család életében, és az iskolában sem. Igaz érkezett egy új lány az osztályba, akivel kezdetben nagyon jóban voltak, sokat emlegette, de most mintha már vele sem barátkozna. Nagyon aggódik, nem tudja mi történhetett és hogyan lehetne kilábalni ebből a helyzetből.", "options": ["nemi identitás nehézsége", "autoritáskrízis", "serdülőkori krízis", "táplálkozási zavar", "testképzavar"], "correct": ["serdülőkori krízis", "táplálkozási zavar", "testképzavar"], "explanation": "A befelé fordulás, izoláció és kapcsolatvesztés serdülőkori krízisre utalhat.\nA közös étkezések kerülése, fogyás, sápadtság és fürdőszobába zárkózás táplálkozási zavarra utaló jelek.\nA táplálkozási zavarhoz gyakran testképzavar is kapcsolódik.\nNemi identitás nehézségére vagy autoritáskrízisre a leírás nem ad elég konkrét jelet."}, {"id": 65, "type": "tf_each", "stem": "A következő esetleírás kapcsán válaszd ki, hogy milyen serdülőkori jellegzetességet azonosíthatunk benne!\nMinden válaszlehetőség esetén döntsd el, hogy helyes vagy helytelen\nEgy szülő keres meg azzal a problémával, hogy 14 éves fia viselkedése az utóbbi időben nagyon megváltozott. Nagyon éles eszű, jó tanuló fiú, azonban mostanában mindenkivel csak konfliktusokat generál. Elsősorban a tanárokkal vitatkozik, mindig, mindenbe beleköt, „beszól” nekik. Az egyik tanár szerint nagyon okos fiú, de csak arra használja az eszét, hogy „leégesse” őket. Az utóbbi időben már a jegyei is leromlottak Az egyik tanár már azt is megjegyezte, hogy lehet nem is olyan okos ez a gyerek, mint ahogyan ezt korábban gondolták! Az iskolai problémák az apjával való viszonyát nagyon elmérgesítették, a tanulmányi eredményei romlása miatt szinte állandó a veszekedés otthon.", "options": ["pszichoneurotikus problémák", "epigenetikus elv", "identitás krízis", "autoritáskrízís", "moratórium"], "correct": {"pszichoneurotikus problémák": false, "epigenetikus elv": false, "identitás krízis": true, "autoritáskrízís": true, "moratórium": false}, "explanation": "Az autoritáskrízis egyértelmű: tanárokkal és apával kerül konfliktusba, tekintélyszemélyekkel vitatkozik, „beszól”.\nAz identitáskrízis is elfogadható, mert a viselkedés megváltozása, önmagáról alkotott kép és teljesítményének megkérdőjeleződése identitásfeszültségre utalhat.\nA pszichoneurotikus problémákhoz nem elég a leírás: nincs konkrét szorongásos, testi vagy neurotikus tünet.\nAz epigenetikus elv Erikson általános fejlődéselméleti fogalma, nem esetleírásos tünet.\nA moratóriumhoz aktív identitáskeresés kellene; itt inkább konfliktus és autoritáskrízis látszik, nem világos exploráció."}]</script>
<script>
const originalQuestions=JSON.parse(document.getElementById('data').textContent);
let questions=[];
function shuffle(a){const arr=[...a];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}
function norm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,' ').trim()}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function setup(){questions=shuffle(originalQuestions).map(q=>{let c=structuredClone(q); if(c.options)c.options=shuffle(c.options); if(c.type==='pair'){c.lefts=shuffle(c.pairs.map(p=>p[0])); c.rights=shuffle(c.pairs.map(p=>p[1]));} return c}); render();}
function reshuffle(){ if(confirm('Újrakeverjem a tesztet? A mostani válaszaid elvesznek.')) setup(); }
function render(){document.getElementById('count').textContent=questions.length; const root=document.getElementById('quiz'); root.innerHTML=''; questions.forEach((q,idx)=>{const card=document.createElement('article');card.className='card';card.id='q'+q.id; let html=`<div class="qhead">${idx+1}. kérdés <span class="smallmuted">(eredeti: ${q.id}.)</span></div><div class="stem">${esc(q.stem)}</div>`; if(q.type==='single'||q.type==='multi'){const typ=q.type==='multi'?'checkbox':'radio'; html += q.options.map((o,i)=>`<label class="option"><input type="${typ}" name="q${q.id}" value="${esc(o)}" onchange="updateProgress()"><span>${esc(o)}</span></label>`).join('');}
 else if(q.type==='pair'){html += `<p class="smallmuted">Válaszd ki mindegyik fogalomhoz a megfelelő párt.</p>` + q.lefts.map(left=>`<div class="pairrow"><div class="pairleft">${esc(left)}</div><select name="q${q.id}" data-left="${esc(left)}" onchange="updateProgress()"><option value="">Válassz...</option>${q.rights.map(r=>`<option value="${esc(r)}">${esc(r)}</option>`).join('')}</select></div>`).join('');}
 else if(q.type==='tf_each'){html += `<div class="tfgrid">` + q.options.map(o=>`<div class="tfitem"><div class="label">${esc(o)}</div><div class="tfchoices"><label><input type="radio" name="q${q.id}_${norm(o)}" value="true" onchange="updateProgress()"> helyes</label><label><input type="radio" name="q${q.id}_${norm(o)}" value="false" onchange="updateProgress()"> helytelen</label></div></div>`).join('') + `</div>`;}
 card.innerHTML=html; root.appendChild(card);}); updateProgress();}
function getUserAnswer(q){ if(q.type==='single') return [...document.querySelectorAll(`input[name="q${q.id}"]:checked`)].map(x=>x.value); if(q.type==='multi') return [...document.querySelectorAll(`input[name="q${q.id}"]:checked`)].map(x=>x.value); if(q.type==='pair'){const obj={}; document.querySelectorAll(`select[name="q${q.id}"]`).forEach(s=>obj[s.dataset.left]=s.value); return obj;} if(q.type==='tf_each'){const obj={}; q.options.forEach(o=>{const el=document.querySelector(`input[name="q${q.id}_${CSS.escape(norm(o))}"]:checked`); obj[o]=el?el.value==='true':null;}); return obj;}}
function isCorrect(q,ua){ if(q.type==='single'||q.type==='multi'){const a=new Set((ua||[]).map(norm)), c=new Set((q.correct||[]).map(norm)); if(a.size!==c.size)return false; for(const x of c) if(!a.has(x)) return false; return true;} if(q.type==='pair'){const corr=Object.fromEntries(q.pairs.map(p=>[norm(p[0]),norm(p[1])])); return q.lefts.every(l=>norm(ua[l])===corr[norm(l)]);} if(q.type==='tf_each'){return q.options.every(o=>ua[o]!==null && ua[o]===q.correct[o]);} }
function answered(q){const ua=getUserAnswer(q); if(q.type==='single'||q.type==='multi') return ua.length>0; if(q.type==='pair') return q.lefts.every(l=>ua[l]); if(q.type==='tf_each') return q.options.every(o=>ua[o]!==null);}
function updateProgress(){const done=questions.filter(answered).length;document.getElementById('bar').style.width=(done/questions.length*100)+'%';}
function fmtList(arr){return arr&&arr.length?arr.map(esc).join('; '):'Nincs válasz'}
function pairReview(q, ua, correct=false){const map=Object.fromEntries(q.pairs.map(p=>[p[0],p[1]])); return `<div class="review-pairs">` + q.pairs.map(([l,r])=>`<div class="review-pair"><b>${esc(l)}</b><div>→ ${esc(correct?r:(ua[l]||'Nincs válasz'))}</div></div>`).join('') + `</div>`;}
function tfReview(q, ua, correct=false){return `<div class="review-pairs">` + q.options.map(o=>`<div class="review-pair"><b>${esc(o)}</b><div>→ ${correct?(q.correct[o]?'helyes':'helytelen'):(ua[o]===null?'Nincs válasz':(ua[o]?'helyes':'helytelen'))}</div></div>`).join('') + `</div>`;}
function evaluateQuiz(){const wrong=[];let score=0;questions.forEach(q=>{const ua=getUserAnswer(q); if(isCorrect(q,ua)) score++; else wrong.push({q,ua});}); const res=document.getElementById('results'); let html=`<div class="score">Eredmény: ${score}/${questions.length} helyes válasz</div>`; if(!wrong.length){html+=`<div class="card"><b>Minden válasz helyes.</b></div>`;} else {html+=`<h2>Hibás válaszok visszanézése</h2><p class="smallmuted">Csak a hibásan megválaszolt kérdések jelennek meg. A magyarázat minden hibás kérdés alatt látható.</p>`; wrong.forEach(({q,ua})=>{html+=`<article class="card wrong"><div class="qhead">Eredeti ${q.id}. kérdés</div><div class="stem">${esc(q.stem)}</div>`; if(q.type==='pair'){html+=`<div class="ansbox"><div class="labelred">A te válaszod:</div>${pairReview(q,ua,false)}</div><div class="goodbox"><div class="labelgreen">Jó válasz:</div>${pairReview(q,ua,true)}</div>`;} else if(q.type==='tf_each'){html+=`<div class="ansbox"><div class="labelred">A te válaszod:</div>${tfReview(q,ua,false)}</div><div class="goodbox"><div class="labelgreen">Jó válasz:</div>${tfReview(q,ua,true)}</div>`;} else {html+=`<div class="ansbox"><span class="labelred">A te válaszod:</span> ${fmtList(ua)}</div><div class="goodbox"><span class="labelgreen">Jó válasz:</span> ${fmtList(q.correct)}</div>`;} html+=`<div class="explain"><b>Magyarázat:</b>\n${esc(q.explanation||'Nincs megadott magyarázat.')}</div></article>`;});}
res.innerHTML=html;res.scrollIntoView({behavior:'smooth',block:'start'});}
setup();
</script>
</body></html>
