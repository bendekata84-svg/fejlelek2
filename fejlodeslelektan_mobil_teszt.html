<!doctype html>
<html lang="hu"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fejlődéslélektan mobil teszt</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#162033;--muted:#667085;--line:#d9deea;--ok:#147a3f;--bad:#b42318;--accent:#3157d5}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.45}
header{position:sticky;top:0;z-index:5;background:rgba(246,247,251,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 14px}
.wrap{max-width:860px;margin:0 auto;padding:14px}h1{font-size:21px;margin:0 0 6px}.small{font-size:13px;color:var(--muted)}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin:14px 0;box-shadow:0 4px 14px rgba(16,24,40,.06)}
.qtop{display:flex;gap:8px;align-items:flex-start;justify-content:space-between;margin-bottom:10px}.badge{font-weight:700;color:var(--accent);font-size:14px;white-space:nowrap}.prompt{font-weight:700;white-space:pre-wrap}
.option{display:flex;gap:10px;align-items:flex-start;width:100%;padding:12px;margin:8px 0;border:1px solid var(--line);border-radius:14px;background:#fff;font-size:16px;text-align:left}
.option input{margin-top:3px;min-width:18px;min-height:18px}select,input[type=text]{width:100%;font-size:16px;border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff}

let questions=[];
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function norm(s){return (s||'').toString().trim().toLowerCase().replace(/\s+/g,' ')}
function esc(s){return (s||'').toString().replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function newRun(){
 questions=shuffle(SOURCE_QUESTIONS.map(q=>{let x=JSON.parse(JSON.stringify(q)); if(x.options) x.options=shuffle(x.options.map((t,i)=>({t,orig:i}))); if(x.type==='match'){x.rights=shuffle(x.pairs.map(p=>p.right)); x.lefts=shuffle(x.pairs.map(p=>p.left));} return x;}));
 render(); document.getElementById('results').classList.add('hidden'); window.scrollTo(0,0);
}
function render(){
 const root=document.getElementById('quiz'); root.innerHTML='';
 questions.forEach((q,qi)=>{
  const div=document.createElement('section'); div.className='card'; div.dataset.qid=q.id;
  let html=`<div class="qtop"><div class="prompt">${esc(q.prompt)}</div><div class="badge">${qi+1}/${questions.length}</div></div>`;
  if(q.note) html+=`<div class="note">${esc(q.note)}</div>`;
  if(q.type==='single'||q.type==='multi'){
    const inputType=q.type==='single'?'radio':'checkbox';
    html += q.options.map((o,oi)=>`<label class="option"><input type="${inputType}" name="q${q.id}" value="${esc(o.t)}"><span>${esc(o.t)}</span></label>`).join('');
  } else if(q.type==='match'){
    html += `<div class="small">Válaszd ki minden bal oldali elemhez a megfelelő párt.</div>`;
    html += q.lefts.map((left,li)=>`<div class="matchrow"><div class="left">${esc(left)}</div><select name="q${q.id}_${li}" data-left="${esc(left)}"><option value="">Válassz párt…</option>${q.rights.map(r=>`<option value="${esc(r)}">${esc(r)}</option>`).join('')}</select></div>`).join('');
  } else if(q.type==='text'){
    html += `<input type="text" name="q${q.id}" placeholder="Írd be a választ…"><div class="small">Tipp: három szintet kell felsorolni.</div>`;
  }
  div.innerHTML=html; root.appendChild(div);
 });
 document.getElementById('progress').textContent=`${questions.length} kérdés. A kérdések és a válaszok keverve jelennek meg.`;
}
function getUser(q){
 const card=document.querySelector(`[data-qid="${q.id}"]`);
 if(q.type==='single'||q.type==='multi') return [...card.querySelectorAll('input:checked')].map(i=>i.value);
 if(q.type==='match') return [...card.querySelectorAll('select')].map(s=>({left:s.dataset.left,right:s.value}));
 if(q.type==='text') return [card.querySelector('input').value];
 return [];
}
function isCorrect(q,u){
 if(q.type==='match'){const map=Object.fromEntries(q.pairs.map(p=>[norm(p.left),norm(p.right)])); return u.length===q.pairs.length && u.every(x=>x.right && norm(x.right)===map[norm(x.left)]);}
 if(q.type==='text'){const a=norm(u[0]); return ['egyéni','párkapcsolat','családi'].every(w=>a.includes(w));}
 const c=(q.correct||[]).map(norm).sort(); const uu=(u||[]).map(norm).sort();
 return c.length>0 && c.length===uu.length && c.every((x,i)=>x===uu[i]);
}
function correctText(q){
 if(q.type==='match') return q.pairs.map(p=>`${p.left} → ${p.right}`).join('; ');
 if(q.type==='text') return q.answerText;
 return (q.correct||[]).join('; ');
}
function userText(q,u){
 if(q.type==='match') return u.map(x=>`${x.left} → ${x.right||'nincs válasz'}`).join('; ');
 return u.length?u.join('; '):'nincs válasz';
}
function gradeQuiz(){
 let good=0,bad=[];
 questions.forEach((q,idx)=>{const u=getUser(q); const ok=isCorrect(q,u); if(ok) good++; else bad.push({num:idx+1,q,u});});
 const res=document.getElementById('results'); res.classList.remove('hidden');
 let html=`<div class="result">Eredmény: ${good} / ${questions.length}</div><div class="small">A helytelen vagy üres válaszok lent visszanézhetők.</div>`;
 if(!bad.length) html += `<p class="oktxt">Minden válasz helyes.</p>`;
 else html += bad.map(b=>`<div class="card badbox"><div class="badge">${b.num}. kérdés</div><div class="prompt">${esc(b.q.prompt)}</div><p><span class="badtxt">A te válaszod:</span> ${esc(userText(b.q,b.u))}</p><p><span class="oktxt">Jó válasz:</span> ${esc(correctText(b.q))}</p></div>`).join('');
 res.innerHTML=html; res.scrollIntoView({behavior:'smooth',block:'start'});
}
function clearAnswers(){document.querySelectorAll('input').forEach(i=>{if(i.type==='text')i.value=''; else i.checked=false});document.querySelectorAll('select').forEach(s=>s.value='');document.getElementById('results').classList.add('hidden');}
newRun();
</script></body></html>
